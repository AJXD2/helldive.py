repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.408
    hooks:
      - id: pyright

  - repo: local
    hooks:
      - id: run_tests
        language: system
        name: Run tests
        entry: uv run pytest
        pass_filenames: false
        stages: [pre-commit]
